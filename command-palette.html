<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Command Palette</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%; height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      .palette {
        position: absolute;
        top: 8px; left: 8px; right: 8px; bottom: 8px;
        background: linear-gradient(165deg, rgba(28, 28, 38, 0.96) 0%, rgba(18, 18, 26, 0.99) 100%);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        color: #e0e0e0;
        display: flex;
        flex-direction: column;
        opacity: 0;
        transform: scale(0.97) translateY(-6px);
        transition: opacity 0.15s ease, transform 0.15s ease;
      }

      .palette.visible {
        opacity: 1;
        transform: scale(1) translateY(0);
      }

      .search-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .search-icon {
        width: 18px; height: 18px;
        opacity: 0.45;
        flex-shrink: 0;
      }

      .search-input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: #fff;
        font-size: 15px;
        font-weight: 400;
        caret-color: rgba(139, 92, 246, 0.8);
      }

      .search-input::placeholder { color: rgba(255, 255, 255, 0.3); }

      .shortcut-hint {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.25);
        padding: 2px 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        flex-shrink: 0;
      }

      .results {
        flex: 1;
        overflow-y: auto;
        padding: 6px 0;
      }

      .results::-webkit-scrollbar { width: 4px; }
      .results::-webkit-scrollbar-track { background: transparent; }
      .results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

      .category-header {
        padding: 6px 16px 4px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: rgba(255, 255, 255, 0.3);
      }

      .result-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 16px;
        cursor: pointer;
        transition: background 0.08s ease;
      }

      .result-item:hover, .result-item.selected {
        background: rgba(139, 92, 246, 0.12);
      }

      .result-item.selected {
        background: rgba(139, 92, 246, 0.18);
      }

      .item-icon {
        width: 20px; height: 20px;
        flex-shrink: 0;
        opacity: 0.6;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .item-icon svg { width: 100%; height: 100%; }

      .item-body {
        flex: 1;
        min-width: 0;
      }

      .item-name {
        font-size: 13px;
        font-weight: 500;
        color: #f0f0f0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .item-name mark {
        background: rgba(139, 92, 246, 0.3);
        color: inherit;
        border-radius: 2px;
        padding: 0 1px;
      }

      .item-desc {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.35);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .item-badge {
        font-size: 9px;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        flex-shrink: 0;
      }

      .badge-feature { background: rgba(59, 130, 246, 0.15); color: rgba(147, 197, 253, 0.9); }
      .badge-agent { background: rgba(139, 92, 246, 0.15); color: rgba(196, 181, 253, 0.9); }
      .badge-space { background: rgba(16, 185, 129, 0.15); color: rgba(110, 231, 183, 0.9); }
      .badge-ai { background: rgba(245, 158, 11, 0.15); color: rgba(253, 230, 138, 0.9); }
      .badge-tool { background: rgba(107, 114, 128, 0.15); color: rgba(209, 213, 219, 0.9); }
      .badge-idw { background: rgba(236, 72, 153, 0.15); color: rgba(251, 207, 232, 0.9); }
      .badge-voice { background: rgba(20, 184, 166, 0.15); color: rgba(153, 246, 228, 0.9); }

      .item-shortcut {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.2);
        flex-shrink: 0;
      }

      .empty-state {
        padding: 32px 16px;
        text-align: center;
        color: rgba(255, 255, 255, 0.25);
        font-size: 13px;
      }

      .footer {
        padding: 8px 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.2);
      }

      .footer kbd {
        display: inline-block;
        padding: 1px 4px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 3px;
        font-family: inherit;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="palette" id="palette">
      <div class="search-row">
        <div class="search-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <input class="search-input" id="searchInput" type="text" placeholder="Search features, agents, spaces..." autocomplete="off" spellcheck="false" />
        <span class="shortcut-hint">esc</span>
      </div>
      <div class="results" id="results"></div>
      <div class="footer">
        <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> navigate</span>
        <span><kbd>enter</kbd> open</span>
        <span><kbd>esc</kbd> close</span>
      </div>
    </div>

    <script>
      const palette = document.getElementById('palette');
      const searchInput = document.getElementById('searchInput');
      const resultsEl = document.getElementById('results');

      let allItems = [];
      let filtered = [];
      let selectedIdx = 0;

      const ICONS = {
        settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
        code: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>',
        video: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><polygon points="10 8 16 12 10 16"/></svg>',
        folder: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',
        space: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/></svg>',
        search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
        audio: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
        bot: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M12 8V5"/><circle cx="12" cy="3" r="2"/><circle cx="9" cy="14" r="1.5" fill="currentColor"/><circle cx="15" cy="14" r="1.5" fill="currentColor"/></svg>',
        health: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
        budget: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
        tool: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
        mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>',
        globe: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
        help: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
        recorder: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>',
        idw: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
      };

      const ICON_MAP = {
        'app-feature': { 'Video Editor': 'video', 'GSX Create': 'code', 'Settings': 'settings', 'Budget Manager': 'budget', 'App Health': 'health', 'Agent Manager': 'bot' },
        'tool': { 'Black Hole': 'tool', 'Clipboard Viewer': 'folder' },
      };

      function getItemIcon(item) {
        const mapped = ICON_MAP[item.type]?.[item.name];
        if (mapped && ICONS[mapped]) return ICONS[mapped];
        if (item.icon && ICONS[item.icon]) return ICONS[item.icon];
        const typeDefaults = {
          'app-feature': 'tool', 'agent': 'bot', 'space': 'space', 'tool': 'tool',
          'external-bot': 'globe', 'image-creator': 'globe', 'video-creator': 'video',
          'audio-generator': 'audio', 'idw-environment': 'idw', 'voice-command': 'mic',
        };
        return ICONS[typeDefaults[item.type] || 'tool'] || ICONS.tool;
      }

      function getBadgeClass(type) {
        const map = {
          'app-feature': 'badge-feature', 'agent': 'badge-agent', 'space': 'badge-space',
          'tool': 'badge-tool', 'external-bot': 'badge-ai', 'image-creator': 'badge-ai',
          'video-creator': 'badge-ai', 'audio-generator': 'badge-ai', 'idw-environment': 'badge-idw',
          'voice-command': 'badge-voice',
        };
        return map[type] || 'badge-tool';
      }

      function getBadgeLabel(type) {
        const map = {
          'app-feature': 'Feature', 'agent': 'Agent', 'space': 'Space', 'tool': 'Tool',
          'external-bot': 'AI', 'image-creator': 'AI', 'video-creator': 'AI',
          'audio-generator': 'AI', 'idw-environment': 'IDW', 'voice-command': 'Voice',
        };
        return map[type] || type;
      }

      const CATEGORY_ORDER = ['app-feature', 'tool', 'voice-command', 'agent', 'external-bot', 'image-creator', 'video-creator', 'audio-generator', 'idw-environment', 'space'];
      const CATEGORY_LABELS = {
        'app-feature': 'Features', 'tool': 'Tools', 'agent': 'Agents', 'space': 'Spaces',
        'external-bot': 'AI Services', 'image-creator': 'Image Creators', 'video-creator': 'Video Creators',
        'audio-generator': 'Audio', 'idw-environment': 'IDW Environments', 'voice-command': 'Voice Commands',
      };

      function fuzzyMatch(query, item) {
        const q = query.toLowerCase();
        const targets = [item.name, item.description || '', ...(item.keywords || [])];
        let score = 0;
        for (const t of targets) {
          const tl = t.toLowerCase();
          if (tl === q) { score += 100; continue; }
          if (tl.startsWith(q)) { score += 80; continue; }
          const idx = tl.indexOf(q);
          if (idx >= 0) { score += 60 - idx * 0.5; continue; }
          const words = q.split(/\s+/);
          const allPresent = words.every(w => tl.includes(w));
          if (allPresent) { score += 40; }
        }
        return score;
      }

      function highlightMatch(text, query) {
        if (!query) return escapeHtml(text);
        const escaped = escapeHtml(text);
        const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return escaped.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
      }

      function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function filterItems(query) {
        if (!query.trim()) {
          filtered = allItems.slice(0, 40);
          return;
        }
        const scored = allItems.map(item => ({ item, score: fuzzyMatch(query, item) }))
          .filter(s => s.score > 0)
          .sort((a, b) => b.score - a.score);
        filtered = scored.slice(0, 20).map(s => s.item);
      }

      function render(query) {
        resultsEl.innerHTML = '';
        if (filtered.length === 0) {
          resultsEl.innerHTML = '<div class="empty-state">No results found</div>';
          return;
        }
        let lastType = null;
        filtered.forEach((item, i) => {
          if (item.type !== lastType) {
            lastType = item.type;
            const header = document.createElement('div');
            header.className = 'category-header';
            header.textContent = CATEGORY_LABELS[item.type] || item.type;
            resultsEl.appendChild(header);
          }
          const row = document.createElement('div');
          row.className = 'result-item' + (i === selectedIdx ? ' selected' : '');
          row.dataset.index = i;
          row.innerHTML = `
            <div class="item-icon">${getItemIcon(item)}</div>
            <div class="item-body">
              <div class="item-name">${highlightMatch(item.name, query)}</div>
              ${item.description ? `<div class="item-desc">${escapeHtml(item.description)}</div>` : ''}
            </div>
            <span class="item-badge ${getBadgeClass(item.type)}">${getBadgeLabel(item.type)}</span>
            ${item.shortcut ? `<span class="item-shortcut">${escapeHtml(item.shortcut)}</span>` : ''}
          `;
          row.addEventListener('click', () => executeItem(item));
          row.addEventListener('mouseenter', () => {
            selectedIdx = i;
            updateSelection();
          });
          resultsEl.appendChild(row);
        });
      }

      function updateSelection() {
        resultsEl.querySelectorAll('.result-item').forEach((el, i) => {
          el.classList.toggle('selected', i === selectedIdx);
        });
        const sel = resultsEl.querySelector('.result-item.selected');
        if (sel) sel.scrollIntoView({ block: 'nearest' });
      }

      function executeItem(item) {
        if (!window.palette) return;
        if (item.type === 'agent') {
          window.palette.submitToAgent(item.id, '');
        } else {
          window.palette.execute(item);
        }
        window.palette.dismiss();
      }

      searchInput.addEventListener('input', () => {
        const q = searchInput.value;
        filterItems(q);
        selectedIdx = 0;
        render(q);
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          e.preventDefault();
          if (window.palette) window.palette.dismiss();
          return;
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          const itemEls = resultsEl.querySelectorAll('.result-item');
          if (itemEls.length > 0) {
            selectedIdx = Math.min(selectedIdx + 1, itemEls.length - 1);
            updateSelection();
          }
          return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          selectedIdx = Math.max(selectedIdx - 1, 0);
          updateSelection();
          return;
        }
        if (e.key === 'Enter') {
          e.preventDefault();
          if (filtered[selectedIdx]) executeItem(filtered[selectedIdx]);
          return;
        }
      });

      async function init() {
        if (!window.palette) return;
        try {
          allItems = await window.palette.getItems();
          allItems.sort((a, b) => {
            const ao = CATEGORY_ORDER.indexOf(a.type);
            const bo = CATEGORY_ORDER.indexOf(b.type);
            return (ao === -1 ? 99 : ao) - (bo === -1 ? 99 : bo);
          });
        } catch (err) {
          allItems = [];
        }
        filterItems('');
        selectedIdx = 0;
        render('');
      }

      if (window.palette) {
        window.palette.onShow(() => {
          searchInput.value = '';
          selectedIdx = 0;
          init().then(() => {
            palette.classList.add('visible');
            searchInput.focus();
          });
        });

        window.palette.onHide(() => {
          palette.classList.remove('visible');
        });
      }

      init();
      requestAnimationFrame(() => {
        palette.classList.add('visible');
        searchInput.focus();
      });
    </script>
  </body>
</html>
