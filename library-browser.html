<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edison Step Library</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #111; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column;
    }
    header {
      padding: 16px 24px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #fff; white-space: nowrap; }
    .search-box {
      flex: 1; display: flex; gap: 8px;
    }
    .search-box input {
      flex: 1; padding: 8px 14px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
      color: #e0e0e0; font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #555; }
    .search-box button {
      padding: 8px 18px; background: #2563eb; border: none; border-radius: 6px; color: #fff;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s;
    }
    .search-box button:hover { background: #1d4ed8; }
    .search-box button:disabled { opacity: 0.5; cursor: not-allowed; }
    .stats { font-size: 11px; color: #666; white-space: nowrap; }
    main { flex: 1; overflow-y: auto; padding: 16px 24px; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px;
    }
    .card {
      background: #1a1a1a; border: 1px solid #222; border-radius: 8px; padding: 16px;
      cursor: default; transition: border-color 0.2s;
    }
    .card:hover { border-color: #444; }
    .card-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .card-desc {
      font-size: 12px; color: #888; line-height: 1.5; display: -webkit-box;
      -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-meta { margin-top: 10px; font-size: 11px; color: #555; display: flex; gap: 12px; }
    .empty-state {
      text-align: center; padding: 60px 20px; color: #555;
    }
    .empty-state h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
    .empty-state p { font-size: 13px; }
    .loading { text-align: center; padding: 40px; color: #555; font-size: 13px; }
    footer {
      padding: 12px 24px; border-top: 1px solid #222; display: flex; justify-content: space-between;
      align-items: center; flex-shrink: 0; font-size: 12px; color: #555;
    }
    .pagination { display: flex; gap: 8px; }
    .pagination button {
      padding: 4px 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
      color: #aaa; font-size: 12px; cursor: pointer;
    }
    .pagination button:hover { border-color: #555; color: #fff; }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>Step Library</h1>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search step templates..." autofocus>
      <button id="searchBtn">Search</button>
    </div>
    <div class="stats" id="stats"></div>
  </header>
  <main id="content">
    <div class="loading" id="loading">Loading step templates...</div>
    <div class="grid" id="grid" style="display:none;"></div>
    <div class="empty-state" id="empty" style="display:none;">
      <h2>No results found</h2>
      <p>Try a different search term</p>
    </div>
  </main>
  <footer>
    <div id="pageInfo"></div>
    <div class="pagination">
      <button id="prevBtn" disabled>Previous</button>
      <button id="nextBtn" disabled>Next</button>
    </div>
  </footer>
  <script>
    const PAGE_SIZE = 50;
    let currentSkip = 0;
    let totalCount = 0;

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const grid = document.getElementById('grid');
    const loading = document.getElementById('loading');
    const empty = document.getElementById('empty');
    const stats = document.getElementById('stats');
    const pageInfo = document.getElementById('pageInfo');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    async function loadTemplates(skip = 0) {
      loading.style.display = '';
      grid.style.display = 'none';
      empty.style.display = 'none';
      searchBtn.disabled = true;

      try {
        const query = searchInput.value.trim();
        let items;

        if (query) {
          items = await window.edisonLibrary.search(query, PAGE_SIZE);
          if (items.error) throw new Error(items.error);
          totalCount = items.length;
        } else {
          items = await window.edisonLibrary.getStepTemplates({ skip, take: PAGE_SIZE });
          if (items.error) throw new Error(items.error);
          totalCount = items.length === PAGE_SIZE ? skip + PAGE_SIZE + 1 : skip + items.length;
        }

        loading.style.display = 'none';
        searchBtn.disabled = false;

        if (!items || items.length === 0) {
          empty.style.display = '';
          stats.textContent = '0 results';
          pageInfo.textContent = '';
          prevBtn.disabled = true;
          nextBtn.disabled = true;
          return;
        }

        grid.style.display = '';
        grid.innerHTML = '';
        stats.textContent = query ? `${items.length} result(s)` : `Showing ${skip + 1}-${skip + items.length}`;

        for (const item of items) {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="card-title">${escHtml(item.name)}</div>
            <div class="card-desc">${escHtml(item.description || 'No description')}</div>
            <div class="card-meta">
              ${item.category ? `<span>${escHtml(item.category)}</span>` : ''}
              <span>${escHtml(item.id ? item.id.substring(0, 8) + '...' : '')}</span>
            </div>
          `;
          grid.appendChild(card);
        }

        currentSkip = skip;
        prevBtn.disabled = skip === 0;
        nextBtn.disabled = items.length < PAGE_SIZE;
        pageInfo.textContent = `Page ${Math.floor(skip / PAGE_SIZE) + 1}`;
      } catch (err) {
        loading.style.display = 'none';
        searchBtn.disabled = false;
        empty.style.display = '';
        empty.querySelector('h2').textContent = 'Error';
        empty.querySelector('p').textContent = err.message;
      }
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    searchBtn.addEventListener('click', () => loadTemplates(0));
    searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadTemplates(0); });
    prevBtn.addEventListener('click', () => loadTemplates(Math.max(0, currentSkip - PAGE_SIZE)));
    nextBtn.addEventListener('click', () => loadTemplates(currentSkip + PAGE_SIZE));

    loadTemplates(0);
  </script>
</body>
</html>
