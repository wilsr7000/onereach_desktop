<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: https:"
    />
    <title>Spaces</title>
    <link rel="stylesheet" href="./signature.css" />
    <link rel="stylesheet" href="./spaces.css" />
  </head>
  <body>
    <header class="spaces-header">
      <h1>Spaces</h1>
      <div class="spaces-header-spacer"></div>
      <span class="spaces-phase-badge" title="Module phase indicator">v1 · Workspace Beta</span>
    </header>

    <div class="spaces-layout">
      <!--
        Left rail: Home + dynamic Spaces navigator. Home is the default
        scope (chunk 3o). Uncategorized is the intake + exception zone
        (always present below Home, above the user's Spaces).
      -->
      <nav id="spaces-sidebar" class="spaces-sidebar" aria-label="Spaces">
        <div class="spaces-sidebar-section spaces-sidebar-section-home">
          <ul class="spaces-list" id="spaces-list-home">
            <li
              class="spaces-row spaces-row-home is-active"
              data-scope-id="__home__"
              role="button"
              tabindex="0"
            >
              <span class="spaces-row-dot spaces-row-dot-home" aria-hidden="true"></span>
              <span class="spaces-row-name">Home</span>
            </li>
          </ul>
        </div>

        <div class="spaces-sidebar-search">
          <input
            type="search"
            id="spaces-sidebar-search-input"
            class="spaces-sidebar-search-input"
            placeholder="Search Spaces…"
            autocomplete="off"
            spellcheck="false"
            aria-label="Filter Spaces by name"
          />
        </div>
        <div class="spaces-sidebar-sort">
          <label for="spaces-sidebar-sort-select" class="spaces-sidebar-sort-label">Sort</label>
          <select
            id="spaces-sidebar-sort-select"
            class="spaces-sidebar-sort-select"
            aria-label="Sort Spaces"
          >
            <option value="name">Name (A→Z)</option>
            <option value="recent">Recently updated</option>
          </select>
        </div>

        <div class="spaces-sidebar-section">
          <div class="spaces-sidebar-title">Intake</div>
          <ul class="spaces-list" id="spaces-list-intake">
            <li class="spaces-row spaces-row-intake" data-scope-id="__uncategorized__">
              <span class="spaces-row-dot spaces-row-dot-intake"></span>
              <span class="spaces-row-name">Uncategorized</span>
              <span class="spaces-row-count" data-count-target="uncategorized">—</span>
            </li>
          </ul>
        </div>

        <div class="spaces-sidebar-section">
          <div class="spaces-sidebar-title">Spaces</div>
          <ul class="spaces-list" id="spaces-list-spaces">
            <!--
              Loading skeleton: three shimmer rows mirror the typical
              Space-row shape so first paint shows structure, not text.
              spaces.ts replaces these once listSpaces() resolves.
            -->
            <li class="spaces-skeleton-row" aria-hidden="true">
              <span class="spaces-skeleton-dot"></span>
              <span class="spaces-skeleton-name"></span>
            </li>
            <li class="spaces-skeleton-row" aria-hidden="true">
              <span class="spaces-skeleton-dot"></span>
              <span class="spaces-skeleton-name spaces-skeleton-name-short"></span>
            </li>
            <li class="spaces-skeleton-row" aria-hidden="true">
              <span class="spaces-skeleton-dot"></span>
              <span class="spaces-skeleton-name"></span>
            </li>
          </ul>
        </div>
      </nav>

      <!--
        Main pane: Home news-feed view (chunk 3o, default) OR item
        canvas (chunk 3a-3i, when a Space or Uncategorized is the
        active scope).
      -->
      <main class="spaces-main" id="spaces-main">
        <!--
          Home view region (chunk 3o). Visible when activeScopeId ===
          '__home__'. spaces.ts hides this region when a Space or
          Uncategorized is selected, and shows the items region instead.
          See lite/spaces/HOME-V1.md for the per-card spec.
        -->
        <section
          id="spaces-home-region"
          class="spaces-home-region"
          aria-label="Home"
        ></section>

        <!--
          Items region populated at runtime by spaces.ts when a Space
          or Uncategorized is the active scope. Hidden when Home is
          active.
        -->
        <section
          id="spaces-items-region"
          class="spaces-items-region"
          hidden
        ></section>
      </main>

      <!--
        Right rail: item detail panel. Hidden in Phase 0 (no items to
        select); placeholder kept in the DOM so the Phase 2 wiring has
        a stable mount target.
      -->
      <aside class="spaces-detail" id="spaces-detail" hidden></aside>
    </div>

    <script src="./spaces.js"></script>
  </body>
</html>
