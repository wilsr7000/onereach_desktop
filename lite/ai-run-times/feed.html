<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: https:; font-src 'self' data:; media-src 'self' data: blob:; connect-src 'self'"
    />
    <title>AI Run Times</title>
    <link rel="stylesheet" href="./ai-run-times.css" />
  </head>
  <body>
    <header class="frame-header">
      <div class="frame-header-text">
        <div class="kicker">Agentic University</div>
        <h1>AI Run Times</h1>
        <p class="frame-subtitle">
          Field reports, design patterns, and case studies from teams shipping conversational AI at the edge.
        </p>
      </div>
      <div class="frame-header-actions">
        <button type="button" id="prefs-btn" class="btn-secondary" title="Content preferences">Preferences</button>
        <button type="button" id="refresh-btn" class="btn-secondary" title="Refresh feed">Refresh</button>
        <button type="button" id="export-log-btn" class="btn-secondary" title="Download reading history">Reading Log</button>
      </div>
    </header>

    <div class="prefs-panel" id="prefs-panel" hidden>
      <div class="prefs-header">
        <span class="prefs-title">Content Preferences</span>
        <button type="button" id="prefs-close" class="prefs-close" title="Close" aria-label="Close">&times;</button>
      </div>
      <p class="prefs-intro">
        Topics you opt out of are hidden from the feed but still cached. Use this to focus the surface, not to censor it.
      </p>
      <div class="prefs-list" id="prefs-list"></div>
      <div class="prefs-actions">
        <button type="button" id="prefs-select-all" class="btn-secondary">Select All</button>
        <button type="button" id="prefs-save" class="btn-primary">Save</button>
      </div>
    </div>

    <main class="feed-content" id="feed-content" aria-live="polite"></main>

    <div class="article-overlay" id="article-overlay" hidden>
      <div class="article-modal">
        <header class="article-modal-header">
          <div class="article-modal-meta">
            <span class="article-modal-source" id="article-source"></span>
            <span class="article-modal-reading-time" id="article-reading-time"></span>
          </div>
          <div class="article-modal-actions">
            <button type="button" id="article-original-btn" class="btn-secondary" title="Open in default browser">Open Original</button>
            <button type="button" id="article-close-btn" class="btn-secondary article-close" title="Close" aria-label="Close">&times;</button>
          </div>
        </header>
        <div class="article-modal-body" id="article-body"></div>
      </div>
    </div>

    <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

    <footer class="frame-footer">
      <span class="frame-footer-info" id="footer-info">Loading...</span>
      <button type="button" id="close-btn" class="btn-secondary">Close Window</button>
    </footer>

    <script src="./ai-run-times.js"></script>
  </body>
</html>
