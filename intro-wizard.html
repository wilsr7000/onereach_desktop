<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: file:;"
    />
    <title>Welcome to Onereach.ai</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #0a0a0a;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-app-region: drag;
      }

      .card {
        width: 100%;
        max-width: 440px;
        padding: 40px 36px 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        opacity: 0;
        transform: translateY(8px);
        animation: cardIn 0.4s ease 0.15s forwards;
        -webkit-app-region: no-drag;
      }

      @keyframes cardIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .parent-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.3);
        margin-bottom: 20px;
      }

      .mode-icon {
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        position: relative;
      }

      .mode-icon svg {
        width: 48px;
        height: 48px;
        color: #0099ff;
        opacity: 0.85;
      }

      .icon-glow {
        position: absolute;
        inset: -12px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(0, 153, 255, 0.08) 0%, transparent 70%);
        pointer-events: none;
      }

      .mode-name {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: rgba(255, 255, 255, 0.95);
        margin-bottom: 12px;
      }

      .mode-line {
        font-size: 15px;
        line-height: 1.55;
        color: rgba(255, 255, 255, 0.5);
        max-width: 360px;
        margin-bottom: 24px;
      }

      .mode-prompt {
        font-size: 13px;
        line-height: 1.5;
        color: rgba(0, 153, 255, 0.7);
        background: rgba(0, 153, 255, 0.04);
        border: 1px solid rgba(0, 153, 255, 0.08);
        border-radius: 8px;
        padding: 10px 16px;
        max-width: 380px;
        font-style: italic;
      }

      .mode-prompt::before {
        content: 'Try: ';
        font-style: normal;
        font-weight: 500;
        color: rgba(0, 153, 255, 0.5);
      }

      .dismiss-btn {
        margin-top: 28px;
        padding: 9px 28px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s ease;
        -webkit-app-region: no-drag;
      }

      .dismiss-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.85);
        border-color: rgba(255, 255, 255, 0.1);
      }

      .knowledge-type {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.2);
        margin-top: -8px;
        margin-bottom: 20px;
        font-style: italic;
        display: none;
      }

      .knowledge-type.visible {
        display: block;
      }

      .card-counter {
        position: fixed;
        bottom: 16px;
        right: 20px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.15);
        letter-spacing: 0.04em;
        -webkit-app-region: no-drag;
      }

      .brand-mark {
        position: fixed;
        bottom: 16px;
        left: 20px;
        font-size: 10px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.12);
        letter-spacing: 0.04em;
        -webkit-app-region: no-drag;
      }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <div class="parent-label" id="parentLabel"></div>
      <div class="mode-icon">
        <div class="icon-glow"></div>
        <div id="modeIcon"></div>
      </div>
      <div class="mode-name" id="modeName"></div>
      <div class="knowledge-type" id="knowledgeType"></div>
      <div class="mode-line" id="modeLine"></div>
      <div class="mode-prompt" id="modePrompt"></div>
      <button class="dismiss-btn" id="dismissBtn">Got it</button>
    </div>
    <div class="brand-mark">Onereach.ai</div>
    <div class="card-counter" id="cardCounter"></div>

    <script>
      var MODE_CARDS = [
        {
          parent: 'Acquire Knowledge',
          mode: 'Seek',
          knowledge: 'Declarative -- what is true',
          line: "Facts, rules, data. Whatever is true right now -- and you don't care where the answer lives.",
          prompt: '"What happened at the board meeting last Thursday?"',
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/><line x1="11" y1="8" x2="11" y2="14" opacity="0.4"/><line x1="8" y1="11" x2="14" y2="11" opacity="0.4"/></svg>',
        },
        {
          parent: 'Acquire Knowledge',
          mode: 'Learn',
          knowledge: 'Procedural -- how things are done',
          line: 'For when you need to know how something works, not just that it exists.',
          prompt: '"Teach me how to build a custom agent."',
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 17 8 12 13 15 21 7"/><polyline points="16 7 21 7 21 12"/></svg>',
        },
        {
          parent: 'Acquire Knowledge',
          mode: 'Monitor',
          knowledge: 'Declarative -- what is changing',
          line: "The facts are shifting. You need to know before you're told.",
          prompt: '"Give me my morning brief."',
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5" opacity="0.5"/><circle cx="12" cy="12" r="1.5"/><line x1="12" y1="3" x2="12" y2="5" opacity="0.3"/><line x1="12" y1="19" x2="12" y2="21" opacity="0.3"/><line x1="3" y1="12" x2="5" y2="12" opacity="0.3"/><line x1="19" y1="12" x2="21" y2="12" opacity="0.3"/></svg>',
        },
        {
          parent: 'Do',
          mode: 'Plan',
          line: "For when you know where you're going but not how to get there.",
          prompt: '"Help me structure my week around the product launch."',
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="19" cy="18" r="2"/><line x1="7" y1="11" x2="17" y2="7"/><line x1="7" y1="13" x2="17" y2="17"/></svg>',
        },
        {
          parent: 'Do',
          mode: 'Create',
          line: 'Say what you want to exist. It handles the how.',
          prompt: "\"Turn yesterday's meeting notes into a client-ready deck.\"",
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15 9 22 9 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9 9 9"/></svg>',
        },
        {
          parent: 'Do',
          mode: 'Train',
          knowledge: 'Procedural -- how to make others do it',
          line: 'The knowledge lives in you. The playbook makes it live everywhere.',
          prompt: '"Build a playbook from our onboarding process."',
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><line x1="12" y1="10" x2="12" y2="3"/><line x1="13.5" y1="13" x2="19" y2="18"/><line x1="10.5" y1="13" x2="5" y2="18"/></svg>',
        },
        {
          parent: 'Do',
          mode: 'Coordinate',
          line: 'For when the work involves more than just you.',
          prompt: "\"Send the team a recap with action items from today's call.\"",
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="18" r="2.5"/><line x1="8.5" y1="6" x2="15.5" y2="6"/><line x1="6" y1="8.5" x2="6" y2="15.5"/><line x1="18" y1="8.5" x2="18" y2="15.5"/><line x1="8.5" y1="18" x2="15.5" y2="18"/></svg>',
        },
        {
          parent: 'Explore',
          mode: 'Simulate',
          line: 'For when you want to test an idea before it touches the real world.',
          prompt: '"What would happen to our budget if we doubled the agent fleet?"',
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>',
        },
        {
          parent: 'Explore',
          mode: 'Browse',
          line: "For when you're not looking for anything specific. Yet.",
          prompt: '"Show me what\'s new in the IDW store."',
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="12" x2="12" y2="7"/><line x1="12" y1="12" x2="16" y2="14.5"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>',
        },
      ];

      function renderCard(index) {
        var card = MODE_CARDS[index] || MODE_CARDS[0];
        document.getElementById('parentLabel').textContent = card.parent;
        document.getElementById('modeIcon').innerHTML = card.icon;
        document.getElementById('modeName').textContent = card.mode;
        var kt = document.getElementById('knowledgeType');
        if (card.knowledge) {
          kt.textContent = card.knowledge;
          kt.classList.add('visible');
        } else {
          kt.textContent = '';
          kt.classList.remove('visible');
        }
        document.getElementById('modeLine').textContent = card.line;
        document.getElementById('modePrompt').textContent = card.prompt;
        document.getElementById('cardCounter').textContent = (index + 1) + ' of ' + MODE_CARDS.length;
      }

      function dismiss() {
        if (window.modeCard) {
          window.modeCard.dismiss();
        } else {
          window.close();
        }
      }

      document.addEventListener('DOMContentLoaded', async function () {
        var cardIndex = 0;
        if (window.modeCard) {
          cardIndex = await window.modeCard.getCardIndex();
        }
        renderCard(cardIndex);
      });

      document.getElementById('dismissBtn').addEventListener('click', dismiss);

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' || e.key === 'Enter') {
          dismiss();
        }
      });

      document.body.addEventListener('click', function (e) {
        if (e.target === document.body) {
          dismiss();
        }
      });
    </script>
  </body>
</html>
